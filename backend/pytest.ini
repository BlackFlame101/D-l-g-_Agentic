[pytest]
# Delege backend test configuration.
# Run from the backend/ directory: `pytest tests/e2e -v --timeout=60`.
testpaths = tests
asyncio_mode = auto
addopts = -ra --strict-markers
markers =
    e2e: end-to-end tests that spin subprocesses and hit Supabase
    bridge: tests that require the Node whatsapp-bridge to be runnable
timeout = 60
timeout_method = thread
log_cli = false
