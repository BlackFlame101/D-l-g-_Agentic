# Fly.io configuration for the Delege WhatsApp bridge.
#
# IMPORTANT:
#   - `auto_stop_machines = "off"` is mandatory. Baileys keeps a long-lived
#     WebSocket to WhatsApp; if Fly stops the machine during "idle" HTTP
#     windows the WA session drops and users have to re-scan the QR.
#   - Keep `min_machines_running = 1` and `max_machines_running = 1`. Running
#     multiple bridge replicas would fork the Baileys session and get the
#     WhatsApp number flagged / banned.
#   - `app` and `primary_region` get customized by `fly launch`; feel free
#     to change the region to one closer to you (`cdg` = Paris, `mad` = Madrid,
#     `fra` = Frankfurt).

app = "delege-whatsapp-bridge"
primary_region = "cdg"

[build]

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
