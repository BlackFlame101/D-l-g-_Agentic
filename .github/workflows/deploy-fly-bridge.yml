name: Deploy WhatsApp Bridge Fly.io

on:
  push:
    branches: [main]
    paths:
      - "whatsapp-bridge/**"
      - ".github/workflows/deploy-fly-bridge.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Bridge to Fly.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "Missing required secret: FLY_API_TOKEN"
            exit 1
          fi
          flyctl deploy --remote-only --config "whatsapp-bridge/fly.toml" --dockerfile "whatsapp-bridge/Dockerfile"
